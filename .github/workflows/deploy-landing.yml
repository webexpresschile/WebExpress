name: Deploy Landing to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_8jult4Ear121Vj2KGRVUNtjq
  VERCEL_PROJECT_ID: prj_8v9jXxXQxWrhKhvcFVTUERzqbicD

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Environment
        run: cd landing && vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: cd landing && vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: cd landing && vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
